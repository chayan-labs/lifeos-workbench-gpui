    <line x1="4" y1="50" x2="96" y2="50" stroke="#1c1c0f" stroke-width="2.5" />
    <path d="M50 4 C20 30, 20 70, 50 96" stroke="#2f29e8" stroke-width="3" fill="none" />
    <path d="M50 4 C80 30, 80 70, 50 96" stroke="#ff4b4b" stroke-width="3" fill="none" />
