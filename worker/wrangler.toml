# Cloudflare Worker: Telegram bot (issue #63; docs/ARCHITECTURE.md §3.1).
# Deploy with `wrangler deploy` from this directory (needs `wrangler login` /
# CLOUDFLARE_API_TOKEN once - manual, one-time, see docs/MANUAL-SETUP.md).
name = "lifeos-bot"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Secrets (never committed - set via `wrangler secret put <NAME>`):
#   BOT_TOKEN          - Telegram bot token from @BotFather
#   TURSO_URL          - canonical DB HTTP URL (libsql://...), issue #64
#   TURSO_TOKEN        - Turso auth token, workspace-scoped queries only
#   ANTHROPIC_API_KEY  - Haiku key for the bot's own reasoning (issue #64)

# Vars (non-secret, can live in this file):
#   WORKSPACE_ID - defaults to "default-personal-workspace" if unset (db.ts)
[vars]
# WORKSPACE_ID = "default-personal-workspace"
